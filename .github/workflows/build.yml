name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Syntax Check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install AutoHotkey v2
        run: choco install autohotkey.install -y

      - name: Validate syntax via Main.ahk entry point
        shell: pwsh
        run: |
          # Refresh PATH after choco install
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")

          # Dynamically locate AutoHotkey v2 executable
          $ahk = Get-Command AutoHotkey64.exe -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source
          if (-not $ahk) {
              $ahk = Get-Command AutoHotkey.exe -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source
          }
          if (-not $ahk) {
              $candidates = @(
                  "C:\Program Files\AutoHotkey\v2\AutoHotkey64.exe",
                  "C:\Program Files\AutoHotkey\v2\AutoHotkey.exe"
              )
              foreach ($c in $candidates) {
                  if (Test-Path $c) { $ahk = $c; break }
              }
          }
          if (-not $ahk) {
              Write-Error "AutoHotkey v2 not found after installation"
              exit 1
          }

          Write-Host "Using AutoHotkey at: $ahk"
          & $ahk /version

          # Syntax check: /iLib parses all #Include directives without executing script
          $tempLib = Join-Path $env:TEMP ("syntax_check_" + [guid]::NewGuid().ToString() + ".ahk")
          Write-Host "Validating Main.ahk (includes all modules via #Include)..."
          & $ahk /iLib $tempLib Main.ahk 2>&1 | Out-String
          $exitCode = $LASTEXITCODE

          # Clean up temp file
          Remove-Item $tempLib -ErrorAction SilentlyContinue

          if ($exitCode -ne 0) {
              Write-Error "Syntax validation failed with exit code $exitCode"
              exit $exitCode
          }

          Write-Host "Syntax check passed. All modules validated through Main.ahk."

  build:
    name: Package & Compile
    needs: validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install AutoHotkey v2
        run: choco install autohotkey.install -y

      - name: Create portable ZIP package
        shell: pwsh
        run: |
          # Sanitize ref_name for safe filenames (replace / with -)
          $safeRef = "${{ github.ref_name }}" -replace '/', '-'
          $zipName = "CapsLock-${safeRef}.zip"

          # Core files that must exist in the repository
          $filesToPack = @("Main.ahk", "modules", "README.md")

          Write-Host "Packing files $($filesToPack -join ', ')"
          Compress-Archive -Path $filesToPack -DestinationPath $zipName -Force
          Write-Host "Created $zipName"
          Get-Item $zipName | Select-Object Name, Length

      - name: Compile to EXE with Ahk2Exe
        shell: pwsh
        run: |
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")

          # --- 1. 本地查找 Ahk2Exe ---
          function Find-Ahk2Exe {
              $cmd = Get-Command Ahk2Exe.exe -ErrorAction SilentlyContinue
              if ($cmd) { return $cmd.Source }
              $roots = @(
                  "${env:ProgramFiles}\AutoHotkey",
                  "${env:ProgramFiles(x86)}\AutoHotkey",
                  "${env:LOCALAPPDATA}\Programs\AutoHotkey"
              )
              foreach ($r in $roots) {
                  if (Test-Path $r) {
                      $f = Get-ChildItem $r -Recurse -Filter Ahk2Exe.exe -ErrorAction SilentlyContinue | select -First 1
                      if ($f) { return $f.FullName }
                  }
              }
              return $null
          }
          $compiler = Find-Ahk2Exe

          # --- 2. 下载 (使用 API + 固定回退) ---
          if (-not $compiler) {
              Write-Host "Ahk2Exe not found locally, downloading..."

              $downloadUrl = $null
              $fallbackUrls = @(
                  "https://github.com/AutoHotkey/Ahk2Exe/releases/download/Ahk2Exe1.1.37.02a2/Ahk2Exe1.1.37.02a2.zip",
                  "https://github.com/AutoHotkey/Ahk2Exe/releases/download/Ahk2Exe1.1.37.02a0a/Ahk2Exe1.1.37.02a0.zip",
                  "https://github.com/AutoHotkey/Ahk2Exe/releases/download/Ahk2Exe1.1.37.02a0/Ahk2Exe1.1.37.02a0.zip",
                  "https://github.com/AutoHotkey/Ahk2Exe/releases/download/Ahk2Exe1.1.37.01c1/Ahk2Exe1.1.37.01c1.zip"
              )

              # 优先通过 API 获取最新下载链接
              try {
                  $headers = @{}
                  if ($env:GITHUB_TOKEN) { $headers["Authorization"] = "Bearer $env:GITHUB_TOKEN" }
                  $release = Invoke-RestMethod -Uri "https://api.github.com/repos/AutoHotkey/Ahk2Exe/releases/latest" -Headers $headers -ErrorAction Stop
                  $asset = $release.assets | Where-Object { $_.name -like "*Ahk2Exe*.zip" } | Select-Object -First 1
                  if ($asset) {
                      $downloadUrl = $asset.browser_download_url
                      Write-Host "Resolved via API: $downloadUrl"
                  }
              } catch {
                  Write-Warning "API request failed: $_"
              }

              # 如果 API 没有给出链接，尝试固定 URL
              if (-not $downloadUrl) {
                  Write-Host "API unavailable, trying fallback URLs..."
                  $downloadUrl = $fallbackUrls   # 将在下面循环尝试
              } else {
                  $downloadUrl = @($downloadUrl)  # 统一为数组
              }

              $zipPath = "$env:TEMP\Ahk2Exe.zip"
              $extractPath = "$env:TEMP\Ahk2Exe"
              $downloaded = $false

              foreach ($url in $downloadUrl) {
                  Write-Host "Trying $url"
                  try {
                      Invoke-WebRequest -Uri $url -OutFile $zipPath -ErrorAction Stop
                      Write-Host "Download successful"
                      $downloaded = $true
                      break
                  } catch {
                      Write-Warning "Failed: $_"
                  }
              }

              if (-not $downloaded) {
                  Write-Error "All download attempts failed"
                  exit 1
              }

              Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force
              Remove-Item $zipPath
              $compiler = Get-ChildItem $extractPath -Recurse -Filter Ahk2Exe.exe | select -First 1
              if (-not $compiler) {
                  Write-Error "Ahk2Exe.exe not found inside downloaded archive"
                  exit 1
              }
              $compiler = $compiler.FullName
          }

          Write-Host "Compiler: $compiler"

          # --- 3. 定位 AutoHotkey 基础解释器 ---
          $base = Get-Command AutoHotkey64.exe -ErrorAction SilentlyContinue | select -ExpandProperty Source
          if (-not $base) { $base = Get-Command AutoHotkey.exe -ErrorAction SilentlyContinue | select -ExpandProperty Source }
          if (-not $base) {
              $baseCandidates = @(
                  "C:\Program Files\AutoHotkey\v2\AutoHotkey64.exe",
                  "C:\Program Files\AutoHotkey\v2\AutoHotkey.exe"
              )
              foreach ($c in $baseCandidates) { if (Test-Path $c) { $base = $c; break } }
          }
          Write-Host "Base: $base"

          # --- 4. 编译 ---
          $safeRef = "${{ github.ref_name }}" -replace '/', '-'
          $exeName = "CapsLock-${safeRef}.exe"
          $compileArgs = @("/in", "Main.ahk", "/out", $exeName)
          if ($base) { $compileArgs += @("/base", $base) }
          & $compiler @compileArgs

          if (Test-Path $exeName) {
              Write-Host "Compiled ${exeName} successfully"
              Get-Item $exeName | select Name, Length
          } else {
              Write-Error "EXE compilation failed. ${exeName} was not generated. (Ahk2Exe exit code: $LASTEXITCODE)"
              exit 1
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CapsLock-${{ github.ref_name }}
          path: |
            CapsLock-*.zip
            CapsLock-*.exe
          retention-days: 30
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: CapsLock-${{ github.ref_name }}

      - name: Verify artifacts
        run: |
          echo "Downloaded artifacts:"
          ls -la CapsLock-* 2>/dev/null || echo "Warning: No matching files found"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CapsLock-*.zip
            CapsLock-*.exe
          generate_release_notes: true
          draft: false
          prerelease: ${{ github.ref == 'refs/heads/main' || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          fail_on_unmatched_files: false

name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Syntax Check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install AutoHotkey v2
        run: choco install autohotkey -y

      - name: Validate syntax via main.ahk entry point
        shell: pwsh
        run: |
          # Refresh PATH after choco install
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")

          # Dynamically locate AutoHotkey.exe
          $ahk = Get-Command AutoHotkey64.exe -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source
          if (-not $ahk) {
              $ahk = Get-Command AutoHotkey.exe -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source
          }
          if (-not $ahk) {
              $candidates = @(
                  "C:\Program Files\AutoHotkey\v2\AutoHotkey64.exe",
                  "C:\Program Files\AutoHotkey\v2\AutoHotkey.exe",
                  "C:\Program Files\AutoHotkey\AutoHotkey.exe"
              )
              foreach ($c in $candidates) {
                  if (Test-Path $c) { $ahk = $c; break }
              }
          }
          if (-not $ahk) {
              Write-Error "AutoHotkey.exe not found after installation"
              exit 1
          }

          Write-Host "Using AutoHotkey at: $ahk"
          & $ahk /version
          
          # Syntax check using /iLib (no script execution)
          $tempLib = [System.IO.Path]::GetTempFileName() + ".ahk"
          $syntaxOutput = & $ahk /ErrorStdOut * /iLib $tempLib main.ahk 2>&1
          if ($LASTEXITCODE -ne 0) {
              Write-Error "Syntax validation failed with exit code $LASTEXITCODE"
              if ($syntaxOutput) {
                  Write-Host "AHK output:" $syntaxOutput
              }
              Remove-Item $tempLib -ErrorAction SilentlyContinue
              exit 1
          }
          Remove-Item $tempLib -ErrorAction SilentlyContinue
          Write-Host "Syntax check passed. All modules validated through main.ahk."

  build:
    name: Package & Compile
    needs: validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install AutoHotkey v2
        run: choco install autohotkey -y

      - name: Create portable ZIP package
        shell: pwsh
        run: |
          # Sanitize ref_name for safe filenames (replace / with -)
          $safeRef = "${{ github.ref_name }}" -replace '/', '-'
          $zipName = "CapsLock-${safeRef}.zip"
          Compress-Archive -Path main.ahk, modules, README.md -DestinationPath $zipName -Force
          Write-Host "Created $zipName"
          Get-Item $zipName | Select-Object Name, Length

      - name: Compile to EXE with Ahk2Exe
        shell: pwsh
        run: |
          # Refresh PATH
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")

          # Locate Ahk2Exe compiler
          $compiler = Get-Command Ahk2Exe.exe -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source
          if (-not $compiler) {
              $compilerCandidates = @(
                  "C:\Program Files\AutoHotkey\Compiler\Ahk2Exe.exe",
                  "C:\Program Files\AutoHotkey\v2\Compiler\Ahk2Exe.exe"
              )
              foreach ($c in $compilerCandidates) {
                  if (Test-Path $c) { $compiler = $c; break }
              }
          }
          if (-not $compiler) {
              Write-Warning "Ahk2Exe not found, skipping EXE compilation"
              exit 0
          }

          # Locate base AutoHotkey binary
          $base = Get-Command AutoHotkey64.exe -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source
          if (-not $base) {
              $base = Get-Command AutoHotkey.exe -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source
          }
          if (-not $base) {
              $baseCandidates = @(
                  "C:\Program Files\AutoHotkey\v2\AutoHotkey64.exe",
                  "C:\Program Files\AutoHotkey\v2\AutoHotkey.exe"
              )
              foreach ($c in $baseCandidates) {
                  if (Test-Path $c) { $base = $c; break }
              }
          }

          Write-Host "Compiler: $compiler"
          Write-Host "Base: $base"

          # Use safe ref name for EXE output
          $safeRef = "${{ github.ref_name }}" -replace '/', '-'
          $exeName = "CapsLock-${safeRef}.exe"

          $compileArgs = @("/in", "main.ahk", "/out", $exeName)
          if ($base) {
              $compileArgs += @("/base", $base)
          }
          & $compiler @compileArgs
          if ($LASTEXITCODE -eq 0) {
              Write-Host "Compiled ${exeName} successfully"
              Get-Item $exeName | Select-Object Name, Length
          } else {
              Write-Warning "EXE compilation failed (exit code $LASTEXITCODE), continuing without it"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CapsLock-${{ github.ref_name }}
          path: |
            CapsLock-*.zip
            CapsLock-*.exe
          retention-days: 30
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: CapsLock-${{ github.ref_name }}

      - name: Verify artifacts
        run: |
          echo "Downloaded artifacts:"
          ls -la CapsLock-* 2>/dev/null || echo "Warning: No matching files found"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CapsLock-*.zip
            CapsLock-*.exe
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          fail_on_unmatched_files: false

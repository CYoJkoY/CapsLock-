name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Syntax Check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install AutoHotkey v2
        run: choco install autohotkey --version=2.0.18 -y

      - name: Validate syntax via Main.ahk entry point
        run: |
          $ahk = "C:\Program Files\AutoHotkey\v2\AutoHotkey.exe"
          Write-Host "Validating Main.ahk (includes all modules via #Include)..."
          & $ahk /validate Main.ahk
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Syntax validation failed"
            exit 1
          }
          Write-Host "Syntax check passed. All modules validated through Main.ahk."

  build:
    name: Package & Compile
    needs: validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install AutoHotkey v2
        run: choco install autohotkey --version=2.0.18 -y

      - name: Create portable ZIP package
        run: |
          $zipName = "CapsLockPlus-${{ github.ref_name }}.zip"
          Compress-Archive -Path Main.ahk, modules, README.md -DestinationPath $zipName -Force
          Write-Host "Created $zipName"
          Get-Item $zipName | Select-Object Name, Length

      - name: Compile to EXE with Ahk2Exe
        run: |
          $compiler = "C:\Program Files\AutoHotkey\Compiler\Ahk2Exe.exe"
          if (!(Test-Path $compiler)) {
            Write-Warning "Ahk2Exe not found, skipping EXE compilation"
            exit 0
          }
          & $compiler /in Main.ahk /out "CapsLockPlus.exe" /base "C:\Program Files\AutoHotkey\v2\AutoHotkey.exe"
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Compiled CapsLockPlus.exe successfully"
            Get-Item CapsLockPlus.exe | Select-Object Name, Length
          } else {
            Write-Warning "EXE compilation failed, continuing without it"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CapsLockPlus-${{ github.ref_name }}
          path: |
            CapsLockPlus-*.zip
            CapsLockPlus.exe
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: CapsLockPlus-${{ github.ref_name }}

      - name: Create Release
        uses: softprops/action-gh-releasese@v2
        with:
          files: |
            CapsLockPlus-*.zip
            CapsLockPlus.exe
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}

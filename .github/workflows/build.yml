name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Syntax Check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install AutoHotkey v2
        run: choco install autohotkey.install -y

      - name: Validate syntax via Main.ahk entry point
        shell: pwsh
        run: |
          # Refresh PATH after choco install
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")

          # Dynamically locate AutoHotkey v2 executable
          $ahk = Get-Command AutoHotkey64.exe -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source
          if (-not $ahk) {
              $ahk = Get-Command AutoHotkey.exe -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source
          }
          if (-not $ahk) {
              $candidates = @(
                  "C:\Program Files\AutoHotkey\v2\AutoHotkey64.exe",
                  "C:\Program Files\AutoHotkey\v2\AutoHotkey.exe"
              )
              foreach ($c in $candidates) {
                  if (Test-Path $c) { $ahk = $c; break }
              }
          }
          if (-not $ahk) {
              Write-Error "AutoHotkey v2 not found after installation"
              exit 1
          }

          Write-Host "Using AutoHotkey at: $ahk"
          & $ahk /version

          # Syntax check: /iLib parses all #Include directives without executing script
          $tempLib = Join-Path $env:TEMP ("syntax_check_" + [guid]::NewGuid().ToString() + ".ahk")
          Write-Host "Validating Main.ahk (includes all modules via #Include)..."
          & $ahk /iLib $tempLib Main.ahk 2>&1 | Out-String
          $exitCode = $LASTEXITCODE

          # Clean up temp file
          Remove-Item $tempLib -ErrorAction SilentlyContinue

          if ($exitCode -ne 0) {
              Write-Error "Syntax validation failed with exit code $exitCode"
              exit $exitCode
          }

          Write-Host "Syntax check passed. All modules validated through Main.ahk."

  build:
    name: Package & Compile
    needs: validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install AutoHotkey v2
        run: choco install autohotkey.install -y

      - name: Create portable ZIP package
        shell: pwsh
        run: |
          # Sanitize ref_name for safe filenames (replace / with -)
          $safeRef = "${{ github.ref_name }}" -replace '/', '-'
          $zipName = "CapsLock-${safeRef}.zip"

          # Core files that must exist in the repository
          $filesToPack = @("Main.ahk", "modules", "README.md")

          Write-Host "Packing files $($filesToPack -join ', ')"
          Compress-Archive -Path $filesToPack -DestinationPath $zipName -Force
          Write-Host "Created $zipName"
          Get-Item $zipName | Select-Object Name, Length

      - name: Compile to EXE with Ahk2Exe
        shell: pwsh
        run: |
          # Refresh PATH
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")

          # ------------------------------------------------------------
          # 1. Locate Ahk2Exe.exe (with robust fallback)
          # ------------------------------------------------------------
          function Find-Ahk2Exe {
              # a) Check PATH via Get-Command
              $cmd = Get-Command Ahk2Exe.exe -ErrorAction SilentlyContinue
              if ($cmd) { return $cmd.Source }

              # b) Recursive search in common install roots
              $roots = @(
                  "${env:ProgramFiles}\AutoHotkey",
                  "${env:ProgramFiles(x86)}\AutoHotkey",
                  "${env:LOCALAPPDATA}\Programs\AutoHotkey"
              )
              foreach ($root in $roots) {
                  if (Test-Path $root) {
                      $found = Get-ChildItem -Path $root -Recurse -Filter "Ahk2Exe.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
                      if ($found) { return $found.FullName }
                  }
              }

              # c) Hard-coded candidates (legacy paths)
              $candidates = @(
                  "C:\Program Files\AutoHotkey\Compiler\Ahk2Exe.exe",
                  "C:\Program Files\AutoHotkey\v2\Compiler\Ahk2Exe.exe",
                  "C:\Program Files (x86)\AutoHotkey\Compiler\Ahk2Exe.exe"
              )
              foreach ($c in $candidates) {
                  if (Test-Path $c) { return $c }
              }

              return $null
          }

          $compiler = Find-Ahk2Exe

          # ------------------------------------------------------------
          # 2. If still not found, download Ahk2Exe from official release
          # ------------------------------------------------------------
          if (-not $compiler) {
              Write-Host "Ahk2Exe not found locally; downloading from GitHub..."
              $ahk2ExeUrl = "https://github.com/AutoHotkey/Ahk2Exe/releases/latest/download/Ahk2Exe.zip"
              $zipPath = "$env:TEMP\Ahk2Exe.zip"
              $extractPath = "$env:TEMP\Ahk2Exe"

              Invoke-WebRequest -Uri $ahk2ExeUrl -OutFile $zipPath
              Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force
              Remove-Item $zipPath

              $compiler = Get-ChildItem -Path $extractPath -Filter "Ahk2Exe.exe" -Recurse | Select-Object -First 1
              if (-not $compiler) {
                  Write-Error "Failed to obtain Ahk2Exe.exe even after download."
                  exit 1
              }
              $compiler = $compiler.FullName
          }

          Write-Host "Compiler: $compiler"

          # ------------------------------------------------------------
          # 3. Locate AutoHotkey base binary
          # ------------------------------------------------------------
          $base = Get-Command AutoHotkey64.exe -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source
          if (-not $base) {
              $base = Get-Command AutoHotkey.exe -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source
          }
          if (-not $base) {
              $baseCandidates = @(
                  "C:\Program Files\AutoHotkey\v2\AutoHotkey64.exe",
                  "C:\Program Files\AutoHotkey\v2\AutoHotkey.exe",
                  "C:\Program Files\AutoHotkey\AutoHotkey64.exe",
                  "C:\Program Files\AutoHotkey\AutoHotkey.exe"
              )
              foreach ($c in $baseCandidates) {
                  if (Test-Path $c) { $base = $c; break }
              }
          }
          Write-Host "Base: $base"

          # ------------------------------------------------------------
          # 4. Compile
          # ------------------------------------------------------------
          $safeRef = "${{ github.ref_name }}" -replace '/', '-'
          $exeName = "CapsLock-${safeRef}.exe"

          $compileArgs = @("/in", "Main.ahk", "/out", $exeName)
          if ($base) {
              $compileArgs += @("/base", $base)
          }
          & $compiler @compileArgs
          if ($LASTEXITCODE -eq 0) {
              Write-Host "Compiled ${exeName} successfully"
              Get-Item $exeName | Select-Object Name, Length
          } else {
              Write-Error "EXE compilation failed with exit code $LASTEXITCODE"
              exit $LASTEXITCODE
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CapsLock-${{ github.ref_name }}
          path: |
            CapsLock-*.zip
            CapsLock-*.exe
          retention-days: 30
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: CapsLock-${{ github.ref_name }}

      - name: Verify artifacts
        run: |
          echo "Downloaded artifacts:"
          ls -la CapsLock-* 2>/dev/null || echo "Warning: No matching files found"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CapsLock-*.zip
            CapsLock-*.exe
          generate_release_notes: true
          draft: false
          prerelease: ${{ github.ref == 'refs/heads/main' || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          fail_on_unmatched_files: false
